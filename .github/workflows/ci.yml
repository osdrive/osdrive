name: CI

on:
  pull_request:
    paths:
      - apps/web/infra/infra.yaml

permissions:
  contents: read
  pull-requests: write

jobs:
  cloudformation:
    name: CloudFormation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: CloudFormation Lint
        run: uvx cfn-lint@latest apps/web/infra/infra.yaml
