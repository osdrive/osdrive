AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for OSDrive.

Resources:
  CloudflareUser:
    Type: AWS::IAM::User
    Properties:
      UserName: OSDriveCloudflare
      Policies:
        - PolicyName: OSDriveCloudflarePolicy-SES
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource: "*"
                Condition:
                  StringEquals:
                    ses:FromAddress: hello@osdrive.app

  CloudflareUserAccessKey:
    Type: AWS::IAM::AccessKey
    Properties:
      UserName:
        Ref: CloudflareUser

Outputs:
  AwsAccessKeyId:
    Description: AWS_ACCESS_KEY_ID
    Value:
      Ref: CloudflareUserAccessKey
  AwsSecretAccessKey:
    Description: AWS_SECRET_ACCESS_KEY
    Value:
      Fn::GetAtt:
        - CloudflareUserAccessKey
        - SecretAccessKey
