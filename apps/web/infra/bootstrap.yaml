# Call this stack `osdrive-bootstrap`. This must be deployed manually to setup the Git sync.
# Steps:
#  - Deploy this stack as `osdrive-bootstrap` with the default options.
#  - "Update pending connection" on "GitSyncConnection" (link to it will be in CloudFormation stacks resources pane) to provide GitHub access
#  - Create the `osdrive` CloudFormation stack w/ Git sync, using the IAM roles we already provisioned with the boostrap stack.
#
AWSTemplateFormatVersion: '2010-09-09'
Description: Bootstrap Git sync for osdrive CloudFormation

Resources:
  GitSyncConnection:
    Type: AWS::CodeStarConnections::Connection
    Properties:
      ConnectionName: OSDrive-GitHub
      ProviderType: GitHub

  GitSyncRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: OSDrive-GitSyncRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: CfnGitSyncTrustPolicy
            Effect: Allow
            Principal:
              Service: cloudformation.sync.codeconnections.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: OSDrive-GitSyncRole-CloudFormationAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: SyncToOnlyOsdriveStack
                Effect: Allow
                Action:
                  - cloudformation:CreateChangeSet
                  - cloudformation:DeleteChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:DescribeStackEvents
                  - cloudformation:DescribeStacks
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:GetTemplate
                  - cloudformation:ListChangeSets
                  - cloudformation:ValidateTemplate
                Resource:
                  - !Sub arn:${AWS::Partition}:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/osdrive/*
                  - !Sub arn:${AWS::Partition}:cloudformation:${AWS::Region}:${AWS::AccountId}:changeSet/*/*
              - Sid: ListStacks
                Effect: Allow
                Action:
                  - cloudformation:ListStacks
                Resource: "*"
              - Sid: PolicyForManagedRules
                Effect: Allow
                Action:
                  - events:PutRule
                  - events:PutTargets
                Resource: "*"
                Condition:
                  StringEquals:
                    events:ManagedBy: cloudformation.sync.codeconnections.amazonaws.com
              - Sid: PolicyForDescribingRule
                Effect: Allow
                Action:
                  - events:DescribeRule
                Resource: "*"

  CloudFormationExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: OSDrive-CloudFormationExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess
